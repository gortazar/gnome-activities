name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-deb:
    name: Build .deb
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper python3 python3-pip python3-setuptools
      - name: Build .deb
        run: |
          mkdir -p packaging/dist
          dpkg-buildpackage -us -uc -b
          mv ../gnome-activities_*.deb packaging/dist/
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packaging/dist/*.deb

  build-firefox-extension:
    name: Build Firefox Extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Zip Firefox extension
        run: |
          cd firefox-extension
          zip -r ../gnome-activities-firefox.zip . -x "*.git*"
      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: gnome-activities-firefox.zip

  create-release:
    name: Create GitHub Release
    needs: [build-deb, build-firefox-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/deb-package/*.deb
            artifacts/firefox-extension/gnome-activities-firefox.zip
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dh-python python3-all python3-setuptools python3-click zip
          pip install build

      - name: Build deb package
        run: dpkg-buildpackage -us -uc -b

      - name: Package Firefox extension
        run: |
          cd firefox-extension
          zip -r ../gnome-activities-firefox-extension.zip . -x "native/*"
          cd ..

      - name: Get version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            VER=$(python3 -c "import gnome_activities; print(gnome_activities.__version__)" 2>/dev/null || echo "0.1.0")
            echo "VERSION=${VER}" >> $GITHUB_OUTPUT
            echo "TAG=v${VER}-dev-$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "GNOME Activities v${{ steps.version.outputs.VERSION }}"
          body: |
            ## GNOME Activities ${{ steps.version.outputs.VERSION }}

            ### Installation
            Download the `.deb` package and install:
            ```
            sudo dpkg -i gnome-activities_*.deb
            sudo apt-get install -f
            ```

            ### Firefox Extension
            Download the `.zip` and load as a temporary extension in Firefox,
            or install from the Firefox Add-ons store (when published).
          files: |
            ../*.deb
            gnome-activities-firefox-extension.zip
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}

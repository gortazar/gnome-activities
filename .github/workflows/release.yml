name: Release

on:
  push:
    branches: [main]

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set version
        id: version
        run: |
          echo "VERSION=0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "TAG=v0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper dh-python python3-all python3-setuptools python3-click pybuild-plugin-pyproject zip devscripts
          pip install build

      - name: Update debian changelog version
        run: |
          export DEBEMAIL="github-actions[bot]@users.noreply.github.com"
          export DEBFULLNAME="github-actions[bot]"
          dch -c packaging/debian/changelog \
            --newversion "${{ steps.version.outputs.VERSION }}-1" \
            --distribution unstable \
            "Automated release from commit ${{ github.sha }}"

      - name: Prepare debian directory
        run: ln -s packaging/debian debian

      - name: Build deb package
        run: |
          dpkg-buildpackage -us -uc -b
          mv ../*.deb .

      - name: Package Firefox extension
        run: |
          cd firefox-extension
          zip -r ../gnome-activities-firefox-extension.zip . -x "native/*"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.TAG }}"
          git push origin "${{ steps.version.outputs.TAG }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "GNOME Activities ${{ steps.version.outputs.TAG }}"
          body: |
            ## GNOME Activities ${{ steps.version.outputs.VERSION }}

            Built from commit ${{ github.sha }}

            ### Installation
            Download the `.deb` package and install:
            ```bash
            sudo dpkg -i gnome-activities_${{ steps.version.outputs.VERSION }}-1_all.deb
            sudo apt-get install -f
            ```

            ### Firefox Extension
            Download the `.zip` and load as a temporary extension in Firefox,
            or install from the Firefox Add-ons store (when published).
          files: |
            *.deb
            gnome-activities-firefox-extension.zip
          draft: false
          prerelease: false

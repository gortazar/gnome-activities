name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          cd daemon
          pip install -e ".[dev]"
      - name: Run flake8
        run: |
          cd daemon
          flake8 gnome_activities/ --max-line-length=120

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          cd daemon
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          cd daemon
          pytest tests/ --cov=gnome_activities --cov-report=xml --cov-report=term
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: daemon/coverage.xml

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        run: |
          cd daemon
          bandit -r gnome_activities/ -ll

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint dependencies
        run: |
          pip install flake8 black
      - name: Run flake8
        run: flake8 gnome_activities/ tests/ --max-line-length=120 --extend-ignore=E203,W503
      - name: Run black --check
        run: black --check gnome_activities/ tests/ --line-length=120

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
      - name: Run e2e tests
        run: pytest tests/e2e/ -v --tb=short
      - name: Run security tests
        run: pytest tests/security/ -v --tb=short
      - name: Run full test suite with coverage
        run: pytest tests/ --cov=gnome_activities --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        run: bandit -r gnome_activities/ -ll -x gnome_activities/daemon/service.py

  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dh-python python3-all python3-setuptools python3-click
      - name: Prepare debian directory
        run: ln -s packaging/debian debian
      - name: Build deb package
        run: dpkg-buildpackage -us -uc -b
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: gnome-activities-deb
          path: ../*.deb
